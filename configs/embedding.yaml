# OpenAI-compatible API embedding (secrets in embedding_api.local.yaml)

embedding:
  backend: openai_api
  base_url: https://api.shubiaobiao.cn/v1
  api_key_env: DUOROUTE_EMBED_API_KEY
  model: text-embedding-3-large
  dimensions: 2048
  batch_size: 32
  max_chars: 24000
  max_tokens: 8000
  normalize: true
  request_timeout: 120
