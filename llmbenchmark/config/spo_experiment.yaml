# Unified SPO+ benchmark: aligned baselines + hyperparameter sweep
# Usage: python scripts/run_spo_bench_all.py --config config/spo_experiment.yaml

bench_config: config/baseline_config.yaml
performance_cost_config: config/baseline_config_performance_cost.yaml

seeds: [42, 43, 44]
train_ratio: 0.7
val_ratio: 0.1
alpha: 1.0  # utility = score (performance-only)

embedllm:
  enabled: true
  epochs: 50
  batch_size: 64
  lr: 0.001
  aligned: true
  embed_model: baselines/spo/models/bge-small-en-v1.5
  # Baseline row (grouped BCE, same batching as SPO+)
  baseline_objective: bce_grouped
  # SPO+ weight sweep (lambda on auxiliary BCE; spo-only uses objective=spo)
  spo_beta_grid: [0.0, 0.05, 0.1, 0.2, 0.3, 0.5, 1.0]
  run_spo_only: true

routerdc:
  enabled: true
  epochs: 30
  spo_loss_weight_grid: [0.0, 0.1, 0.3, 0.5]
  # Full train: baselines/RouterDC/train_router_mdeberta_7b.py (needs deepspeed)
  # Lite (default in run_spo_bench_all): baselines/spo/train_routerdc_lite.py

graphrouter:
  enabled: true
  spo_loss_weight_grid: [0.0, 0.1, 0.3, 0.5]
  train_epochs: 150
  # Lite trainer: baselines/spo/train_graphrouter_lite.py (grouped bench → GNN)

hybridllm:
  enabled: true
  # K-way routing on performance-cost pool (needs >=3 models in adaptor)
  models: null  # null = use all models from performance_cost_config
  adaptor_output: baselines/Best-route-llm/data/spo_seed{seed}
  loss_type: det_ncls
  spo_loss_weight_grid: [0.0, 0.1, 0.3, 0.5]
  num_train_epochs: 5

# 2-way only; SPO+ via shared K-head trainer on grouped data (same as EmbedLLM arch)
routellm:
  enabled: true
  use_khead_proxy: true
  note: "RouteLLM MF is pairwise; K-head on grouped bench is aligned proxy"

# Non-differentiable / non-[B,K] — documented only
skip:
  - AvengersPro
  - MODEL-SAT
  - FrugalGPT
